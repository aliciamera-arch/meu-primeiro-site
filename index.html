<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Galeria Infantil - 50 Atividades Mágicas ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard', cursive, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f9e8b5 0%, #fcd5b5 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* cabeçalho divertido */
        .cabecalho-galeria {
            text-align: center;
            margin-bottom: 3rem;
        }

        .cabecalho-galeria h1 {
            font-size: 3rem;
            font-weight: 800;
            color: #2d4059;
            text-shadow: 4px 4px 0 #fbd46d, 6px 6px 0 rgba(0,0,0,0.1);
            letter-spacing: 2px;
            word-break: break-word;
        }

        .cabecalho-galeria p {
            font-size: 1.5rem;
            color: #1f6f8b;
            background-color: #ffeeccdd;
            display: inline-block;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            margin-top: 0.5rem;
            box-shadow: 0 6px 0 #99a8b2;
            border: 2px solid #2d4059;
        }

        /* contador 50 imagens */
        .contador {
            background: #ffb26b;
            max-width: 300px;
            margin: 0 auto 2rem auto;
            padding: 0.8rem 1rem;
            border-radius: 50px;
            border: 3px solid #3a2c1f;
            font-weight: bold;
            font-size: 1.8rem;
            color: #2d1b0e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 0 #7c5a3b;
        }

        .contador span {
            background: #ffd93d;
            padding: 0.2rem 1.2rem;
            border-radius: 30px;
            font-size: 2.5rem;
            border: 2px solid black;
        }

        /* GRADE — 5 colunas x 10 linhas = 50 células */
        .grade-galeria {
            display: grid;
            grid-template-columns: repeat(5, 1fr);  /* 5 colunas */
            gap: 1.2rem;
            max-width: 1300px;
            margin: 2rem auto;
            padding: 1rem;
            background: #fce8b3a0;
            border-radius: 70px 70px 30px 30px;
            border: 5px dashed #ea9010;
            box-shadow: 0 20px 30px #6b4f3f70;
        }

        /* cada card infantil */
        .card-atividade {
            background: #fffef7;
            border-radius: 40px 40px 25px 25px;
            border: 4px solid #3b2c1e;
            box-shadow: 0 10px 0 #8b6c4d, 0 12px 18px rgba(0,0,0,0.2);
            padding: 1rem 0.6rem 0.8rem 0.6rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 210px;
            cursor: pointer;
            background: linear-gradient(145deg, #fcf8e8, #ffe9c4);
        }

        /* efeito brincalhão ao passar o mouse */
        .card-atividade:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 0 #c59a6b, 0 20px 25px #3b2b1d;
            border-color: #f6ae2d;
        }

        /* área da imagem: todas as tags img vão ter essa cara */
        .card-atividade img {
            width: 100%;
            aspect-ratio: 1 / 1;          /* quadradinho fofo */
            object-fit: cover;              /* cobre sem deformar */
            background-color: #b0dee2;       /* fundo placeholder divertido */
            border-radius: 35% 35% 25% 25%;
            border: 4px solid white;
            outline: 3px solid #644e37;
            box-shadow: inset 0 0 0 3px #ffb347, 0 6px 0 #5f4a33;
            display: block;
            transition: all 0.2s;
            padding: 0;                     /* sem espaços internos */
        }

        /* nome da atividade (texto ilustrativo embaixo da imagem) */
        .card-atividade figcaption {
            font-size: 1rem;
            font-weight: 700;
            color: #2f2519;
            background: #ffddbb;
            width: 100%;
            text-align: center;
            padding: 0.5rem 0;
            margin-top: 0.6rem;
            border-radius: 30px;
            border: 2px solid #a1683a;
            box-shadow: inset 0 -3px 0 #bd8a5c;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 50 imagens, usamos imagens de placeholder (loremflickr ou via.placeholder) 
           mas todas apontam para links de atividades infantis ilustrativas */
        .card-atividade img[src] {
            /* garantia de quebra se link falhar */
        }

        /* mensagem extra para links ilustrativos (fofos) */
        .rodape-nota {
            text-align: center;
            background: #ffc18c;
            padding: 1.8rem 1rem;
            border-radius: 120px 120px 40px 40px;
            border: 4px solid #654321;
            max-width: 900px;
            margin: 2rem auto 0 auto;
            font-size: 1.3rem;
            font-weight: 600;
            color: #2b1b0e;
            box-shadow: 0 15px 0 #8b6b4f;
        }

        .rodape-nota a {
            background: #fff2b5;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            text-decoration: none;
            color: #1d4d4f;
            font-weight: 800;
            border: 2px solid #211b10;
        }

        /* ajuste para telas menores: vira 3 colunas */
        @media (max-width: 800px) {
            .grade-galeria {
                grid-template-columns: repeat(3, 1fr);
                gap: 1rem;
            }
            .cabecalho-galeria h1 {
                font-size: 2.3rem;
            }
        }

        @media (max-width: 500px) {
            .grade-galeria {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
